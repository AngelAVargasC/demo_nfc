<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGAM — Sistema Integral de Gestión y Acceso Masónico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;650;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; font-feature-settings: 'cv02','cv03','cv04','cv11'; }
      body { background: #f7f8fa; color: #0b1118; }
      #root { min-height: 100vh; }
      @keyframes sigam-pulse { 0% { transform: scale(1); opacity: 0.35; } 80% { transform: scale(2.2); opacity: 0; } 100% { opacity: 0; } }
      @keyframes sigam-shimmer { 0% { background-position: -200px 0; } 100% { background-position: calc(200px + 100%) 0; } }
      @keyframes sigam-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(127,127,140,0.25); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(127,127,140,0.45); }
      button, input, select, textarea { font-family: inherit; }
      .sigam-row-hover { transition: background 140ms ease, border-color 140ms ease; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
